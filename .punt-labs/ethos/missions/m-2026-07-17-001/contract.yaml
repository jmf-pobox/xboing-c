    - 'Address Cursor''s Medium finding on PR #194: the = debug skip-level cheat awards full score, and nothing stops a cheated session from entering the high-score boards. Maintainer''s decision: using the cheat disqualifies the session from BOTH the personal (local) AND global high-score boards. This is a DELIBERATE DEVIATION from the 1996 original (which allowed cheated scores into the local high-score table) — jck gates it and it gets an ADR.'
