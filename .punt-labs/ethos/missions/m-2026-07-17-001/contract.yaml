    - 'cmake --preset debug && cmake --build build zero-warning -Werror -Wconversion -Wshadow. Full ctest --test-dir build green AND make asan-test green. Only the four write_set files change. (A sibling gjm mission adds a regression test: cheated -> no personal + no global entry.)'
