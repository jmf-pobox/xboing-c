    - 'Gate submit_score (src/game_modes.c:1015): if ctx->cheated, skip the ENTIRE submission — do NOT call highscore_io_insert on hs_personal (line 1020) and do NOT call highscore_io_insert_global_atomic (line 1074). Early-return a value meaning "not submitted / no global write" (return 0 like the no-global-board path) so the downstream youagod/global-rank prompt is also skipped. This is the only path to either board, so one guard blocks both. Optionally set a brief status message (e.g. via message_system or the existing name-entry/bonus flow) indicating no high score for a cheated game — include only if it fits the existing flow cleanly; otherwise skip silently. Do NOT change scoring during play (the cheat still awards points on the live HUD — only the high-score TABLE entry is blocked).'
