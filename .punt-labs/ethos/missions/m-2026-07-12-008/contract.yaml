context: |
    Editor parity STAGE 7 — HUD content-sync in editor mode (design
    docs/specs/2026-07-11-editor-parity.md §3.3, stage list §5.7; committed ffa9e56;
    the §3.3 3-part fix was added in design round 2 after jck caught that a bare
    HUD-gate flip shows stale gameplay state). Blockers 1 (HUD absent in editor).

    The original always maps + repopulates the HUD windows on editor entry/load
    (DoLoadLevel original/editor.c:196-201, LoadALevel :869-871). Modern SDL2ST_EDIT
    omits the HUD entirely, and a naive gate-add would show stale gameplay
    level-number/timer/specials. THREE parts, all read-time except the specials reset:

    1. HUD GATE: add `effective == SDL2ST_EDIT` to the HUD render condition at
       src/game_render.c:1274-1276 (which already resolves DIALOGUE->saved_mode, so
       an editor-dialogue overlay is covered in the same clause). This renders
       score/lives/messages/timer/specials for the editor.
    2. LEVEL NUMBER (read-time redirect): game_render_lives (src/game_render.c:537,
       level read at :564-568) currently uses ctx->attract_level_display / ctx->level_number.
       When the resolved effective mode is SDL2ST_EDIT, source the displayed level from
       editor_system_get_level_number(ctx->editor) (include/editor_system.h:288) instead.
       Resolve the effective mode the same way the HUD block does (current mode; saved_mode
       if DIALOGUE — mirror src/game_render.c:1270-1272). The existing `if (level<=0) level=1`
       clamp reproduces DoLoadLevel's hardcoded 1 for the unnumbered scratch buffer — keep it.
    3. TIMER (read-time redirect): game_render_timer (src/game_render.c:969) reads
       ctx->time_bonus_total/time_remaining (gameplay-only, stale in editor). When the
       effective mode is SDL2ST_EDIT, show the loaded level's full bonus STATICALLY from
       level_system_get_time_bonus(ctx->level) as MM:SS (the editor never runs the
       countdown tick — original ReadNextLevel sets timeWindow to a static value,
       original/file.c:366). Do NOT let the `time_bonus_total<=0` early-return blank the
       editor timer; use the editor source for both the gate and the value.
    4. SPECIALS RESET (the one mutation): add special_system_turn_off(ctx->special)
       (include/special_system.h:129, verified idempotent) unconditionally at the top of
       mode_edit_enter (src/game_modes.c:1359-...), so Killer/Reverse/x2 etc. from an
       abandoned game (E is reachable mid-game) don't leak into the editor — mirroring
       DoLoadLevel's TurnSpecialsOff (original/editor.c:198-200). It must fire on entry
       regardless (LoadALevel does NOT call TurnSpecialsOff, only DoLoadLevel does).

    Do NOT touch the palette (done), the RANDOM_BLK composite (stage 8), paddle/ball
    gating (that is also blocker 2 — DEFER to a separate stage unless trivial here;
    keep this mission to HUD content-sync only), or the dialogue code. Read-time
    redirects only — do not introduce new game_ctx fields for level/timer.
