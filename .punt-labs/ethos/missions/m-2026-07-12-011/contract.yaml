context: |
    USER-REPORTED BUG (highest priority) + jck DRY rec. The user ran the current build:
    the two-column palette RENDERS correctly, but CLICKING a swatch selects the WRONG
    block — "what I click on to select and what is selected are completely different."

    ROOT CAUSE: the palette render and the palette click hit-test each encode the palette
    geometry, and they diverged. The render (game_render_editor_palette, src/game_render.c,
    stages 5+6) uses TWO columns at row pitch PLAY_AREA_H/MAX_ROW (=32): col1 = indices
    0..17 centered ~x=575, col2 = 18..29 centered ~x=635. But the click hit-test
    (src/game_modes.c:1585-1596) still uses the OLD single-column math: palette_entry_h=25,
    idx = (my - PLAY_AREA_Y) / 25, ignoring the column (x) entirely. So clicks map by y-only
    at the wrong pitch to col1 indices — totally divergent from what's drawn.

    FIX A (the bug) — single source of truth for the palette geometry. Make the render AND
    the hit-test derive from ONE geometry definition so they can never diverge again:
    - In src/game_render.c, promote the palette geometry to named constants/helpers used by
      BOTH the render loop and a new hit-test function. Add
      `int game_render_editor_palette_index_at(const game_ctx_t *ctx, int mx, int my)`
      (declared in include/game_render.h) returning the palette index at absolute (mx,my),
      or -1 if outside any swatch. It MUST use the exact same column split, row pitch, col1
      count, and PALETTE_X/Y the render loop uses (col1 if mx left of the column divider
      PALETTE_X+EDITOR_TOOL_WIDTH/2, else col2; row = (my-PALETTE_Y)/pitch; index = in_col1 ?
      row : col1_count + row; validate row within its column and index < palette_count).
      The click region per entry should be the forgiving row-band within the column half
      (not the tight sprite rect), so a click anywhere on a swatch's cell selects it.
    - src/game_modes.c: replace the broken single-column hit-test block (1585-1596) with a
      call to game_render_editor_palette_index_at(ctx, mx, my); if it returns >=0, call
      editor_system_select_palette. Delete the local palette_entry_h=25 / single-column math.

    FIX B (jck's DRY rec, fold in) — the play-grid pixel->cell math is duplicated: editor_system.c
    has static pixel_to_col/pixel_to_row (COL_WIDTH/ROW_HEIGHT macros, editor_system.c:24-25,
    98-106) and stage 10 replicated the identical arithmetic in game_modes.c's right-click
    inspect. Export ONE canonical helper `void editor_system_pixel_to_cell(int play_x, int
    play_y, int *row, int *col)` (or expose pixel_to_col/pixel_to_row) from editor_system.h,
    and use it in game_modes.c's right-click inspect, removing the replica. Keep behavior
    byte-identical.

    Do NOT change the two-column LAYOUT (jck-approved in 5+6) — only make the hit-test match
    it. Do NOT touch dialogue/HUD/paddle/RANDOM. This is coordinate-mapping only.
