context: |
    Editor parity — two render-fidelity fixes (design docs/specs/2026-07-11-editor-parity.md
    §3.4 blocker 2, and §2.4-addendum/§5 stage 8; committed ffa9e56).

    FIX A — paddle/ball suppression in the editor (blocker 2, §3.4). game_render_playfield
    (src/game_render.c:~395) unconditionally calls game_render_paddle (:408) and
    game_render_balls (:411); it is SHARED with SDL2ST_GAME. In the original, the editor's
    RedrawEditorArea (original/editor.c:206-216) draws NO paddle/ball; they appear only
    once SetupPlayTest runs (original/editor.c:587-621) i.e. during EDITOR_STATE_TEST.
    Fix: skip paddle+ball when the current mode is SDL2ST_EDIT AND
    editor_system_get_state(ctx->editor) != EDITOR_STATE_TEST. Use sdl2_state_current(ctx->state)
    inside game_render_playfield (ctx->editor is always available); gameplay (SDL2ST_GAME/PAUSE)
    is unaffected, and editor play-test (EDITOR_STATE_TEST) still shows them.

    FIX B — RANDOM_BLK composite overlay (stage 8, §2.4 addendum). render_block_composite's
    RANDOM_BLK case (src/game_render.c:186-205) keys off block_type == RANDOM_BLK, but
    block_system_add resolves a placed RANDOM_BLK to RED_BLK + a runtime .random flag
    immediately (src/block_system.c:455-459), so block_type is NEVER RANDOM_BLK after
    placement — the "- R -" overlay is dead code in both the editor grid and live gameplay.
    Fix: add a `random` parameter to render_block_composite; show the "- R -" overlay when
    `random` is true (independent of block_type). Update its call sites:
    - game_render_blocks (reads ctx->block cells): pass the cell's random flag from
      block_system_get_render_info(...).random (per-cell); confirm this is the info already
      fetched or fetch it.
    - game_render_editor_palette: the palette RANDOM_BLK swatch is a STATIC preview whose
      entry->block_type IS RANDOM_BLK (a dedicated palette entry, not a live cell) — it must
      still show "- R -". Pass random = (entry->block_type == RANDOM_BLK) for the palette so
      the dedicated random swatch keeps its overlay; do not break the counter/DROP/BULLET
      overlays.
    jck flagged (stage 2): the original only writes '?'/shows random for GetRandomType-eligible
    types; the .random flag co-occurs only with those by construction (block_system.c:455-459) —
    keep that invariant; this fix must not show "- R -" on non-random cells.

    This is gameplay-VISIBLE (random blocks in live play now show "- R -" for the first time) —
    jck must approve. Do NOT touch the dialogue, HUD, palette layout (done), right-click (a
    later stage), or grid lines. Read-only render changes + the one signature change.
