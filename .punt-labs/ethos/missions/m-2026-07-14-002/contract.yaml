context: |-
    Root cause of the maintainer's "level 1 is too hard" report, found during the
    overnight audit flight and confirmed with the maintainer: mid-play special/
    bonus blocks spawn into empty grid holes with NO throttle. The original
    (original/main.c:970-1071 + blocks.c AddSpecialBlock/HandlePendingSpecials)
    keeps exactly one on the grid at a time and auto-expires it after
    BONUS_LENGTH=1500 frames; ~22% of spawns are harmful (shrink/reverse/walloff/
    death). The modern port dropped both throttles (dead bonus_block_active gate +
    infinite lifetime), so harmful specials accumulate without bound — most
    visible on level 1's mostly-empty grid. This is a faithful RESTORE of the
    original, not a redesign. jck (original author) is the evaluator and must
    confirm the restored behavior matches 1996 feel. P1 bead filed. Deliver as a
    branch for maintainer review; do not merge (gameplay change needs sign-off).
