context: |-
    Follow-up correctness fix on fix/audit-findings-batch. Maintainer could not
    see RANDOM_BLK morphing in the real game. Root cause: level blocks are added
    with a hardcoded frame=0, so a RANDOM block's first morph is scheduled at
    next_frame=1, but the `== frame` check misses it (state frame is already past
    1 when block updates run) and it never reschedules -> stuck static. The four
    block-movement timers (roamer eye/move, random morph, drop) were ported with
    the original's literal `== frame`; the modern fixed-timestep port must use
    `>= frame` (its own convention, ball_system.c). jck approved the == earlier as
    faithful, but it's a latent modern-frame-model bug; this corrects it. RANDOM
    is the case that exposed it; roamers/drops get hardened too.
