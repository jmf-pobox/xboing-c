context: |
    Editor parity — Mac-friendly erase (USER decision: "keep inspect, add a Mac-friendly
    erase"; "modern computers do not have middle mouse buttons which were physical on Sun
    workstations"). The original editor mapped left=draw, MIDDLE=erase, right=inspect
    (original/editor.c:521-557). Stage 10 (commit 938847d) faithfully restored right=inspect
    and middle=erase, but modern hardware (Mac trackpads, most 2-button setups) has no
    reliable middle button, so erase is effectively unreachable. This is an accessibility
    gap the 1996 3-button-workstation model never anticipated.

    DECISION (user-approved direction): keep right-click = inspect (faithful, stage 10);
    keep middle-click = erase (unchanged, for those who have it); ADD Shift+left-click =
    erase as the modern, always-reachable affordance. Plain left-click still draws.

    IMPLEMENT:
    - src/game_modes.c mode_edit_update: when a left-click occurs with SHIFT held, route it
      to erase (editor_system_mouse_button(..., 2, 1)) instead of draw; plain left-click
      still draws (button 1). Middle-click (button 2) erase and right-click (button 3)
      inspect stay exactly as they are. Detect Shift via the input layer — check whether
      sdl2_input exposes modifier state; if not, add a minimal accessor (SDL_GetModState /
      KMOD_SHIFT) to src/sdl2_input.c + include/sdl2_input.h. Keep it clean.
    - docs/DESIGN.md: add an ADR "Editor erase reachable without a middle mouse button".
      Record: the original's middle-click erase assumed a physical 3-button Sun/X11 mouse;
      modern trackpads/2-button mice lack it; we ADD Shift+left-click as an erase affordance
      (middle-click retained, right-click inspect unchanged). Cite original/editor.c:521-557.
      This is a deliberate modern-input deviation, not an infidelity — name the constraint.
    - xboing.man.in LEVEL EDITOR section (line ~193-216): update the erase description to
      document Shift+left-click erase (the man already says middle=erase, right=reports
      point value; keep that, add the Shift+click erase and note middle-click needs a
      3-button mouse). Match the existing man-page style exactly (same .RS/.nf/.fi idiom,
      concise prose).
    Do NOT touch the grid/palette-border render (separate mission m-2026-07-12-012 on
    game_render.c), the dialogue, HUD, or palette hit-test.
