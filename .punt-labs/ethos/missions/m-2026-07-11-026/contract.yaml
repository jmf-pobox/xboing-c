context: |
    The level editor (SDL2ST_EDIT) has never been through a parity audit against
    the 1996 original. A visual comparison (modern screenshot vs
    original/level-editor.gif) surfaced ~8 obvious gaps, but we need the COMPLETE,
    authoritative list before designing the parity work. This is an investigate/
    audit mission: produce a written deliverable, no code changes.

    The just-landed width fix (commit c490555, this branch) widened the editor
    canvas 575->695 so the palette is visible — that part is DONE and is NOT in
    scope for this audit except to note it as resolved. Everything else about the
    editor's fidelity is in scope.

    Canonical reference: original/editor.c and original/stage.c (the editor's
    sub-windows: playWindow, blockWindow, typeWindow, levelWindow, messWindow).
    Modern implementation: src/editor_system.c, src/game_render.c (editor render
    dispatch), src/game_modes.c (mode_edit_*), src/game_input.c (editor input),
    src/game_callbacks.c (editor callbacks). Read the original FIRST, cite
    original/<file>.c:<line> for every gap.
