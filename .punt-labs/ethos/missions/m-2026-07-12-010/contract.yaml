context: |
    Editor parity STAGE 10 — right-click inspect vs erase (design
    docs/specs/2026-07-11-editor-parity.md §4.1, stage list §5.10; committed ffa9e56;
    §4.1 was revised in design round 2 to add the held-override persistence jck required).
    Audit major 4.

    Today mode_edit_update maps BOTH middle (button 2) and right (button 3) mouse to
    erase (src/game_modes.c:1442-1443: `if (mouse_pressed 2 || mouse_pressed 3)
    editor_system_mouse_button(..., 2, 1)`). The original's Button3 is READ-ONLY: it
    shows the clicked block's hit points in the score window and never modifies the grid
    (original/editor.c:547-557: DisplayScore(scoreWindow, blockP->hitPoints) or 0 if empty,
    drawAction=ED_NOP). Button1=draw, Button2=erase, Button3=inspect.

    DESIGN §4.1 (recommendation b + persistence):
    - Split the handler: button 2 (middle) stays erase; button 3 (right) becomes a
      read-only inspect — do NOT route it through editor_system_mouse_button (the
      destructive draw-action path). Instead, in mode_edit_update, convert play_x/play_y
      to (row,col) and query block_system_get_hit_points(ctx->block, row, col) (occupied ->
      hit points; unoccupied -> 0), matching Button3's two DisplayScore calls.
    - PERSISTENCE (jck's design-round-2 requirement): game_render_score runs every frame,
      so a one-shot write is overwritten next frame. Add two game_ctx_t fields modeled on
      attract_level_display (include/game_context.h:162): `int editor_inspect_active;
      unsigned long editor_inspect_value;`. Button-3 sets both (active=1, value=hit points).
      game_render_score consumes the override IN PLACE OF score_system_get(ctx->score)
      ONLY when the effective mode is SDL2ST_EDIT and editor_inspect_active (gate to editor
      so it never leaks into the gameplay HUD). Never auto-cleared (original overwrites on
      each Button3, nothing reverts it) — but reset editor_inspect_active in mode_edit_exit
      as hygiene so it doesn't persist into a later editor session.
    - Effective-mode resolution: same pattern as game_render_lives/timer (sdl2_state_current;
      saved_mode if DIALOGUE).

    Figure out the play_x/play_y -> (row,col) conversion the way the editor already does it
    (read editor_system_mouse_button / block_system coordinate helpers); reuse an existing
    helper if one exists rather than hardcoding the grid math.

    Do NOT touch the dialogue, palette, HUD, paddle/ball gate, or RANDOM overlay. This is
    right-click inspect only.
