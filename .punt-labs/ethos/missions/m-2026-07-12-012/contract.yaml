context: |
    Editor parity — two render-fidelity gaps the USER spotted running the build on macOS:
    (1) the faint red editor grid lines are missing, and (2) the red bounding box around
    the block-type palette panel (and the Active box) is missing.

    GRID (blocker/major 6, xboing-c40 — user now wants it IN this effort). Port
    DrawEditorGrid (original/editor.c:139-153): red grid over the editable play area.
    Read those exact lines for the geometry. Per design §3.5: vertical lines at
    x = xinc, 2*xinc, ..., PLAY_AREA_W down to PLAY_AREA_H - 4 - 3*yinc; horizontal lines
    at y = yinc, ..., PLAY_AREA_H - 3*yinc; xinc = PLAY_AREA_W/MAX_COL, yinc =
    PLAY_AREA_H/MAX_ROW; color = red (original uses reds[4], a mid-red). The paddle-
    reserved bottom rows are excluded (that's the -3*yinc). Draw the grid ONLY in the
    editor and ONLY when NOT EDITOR_STATE_TEST (original/editor.c:210-211 gates it off
    during play-test), in the SDL2ST_EDIT render path (after the blocks so lines overlay
    the grid, matching the original which draws the grid after RedrawAllBlocks).

    PALETTE PANEL BORDERS. The original creates blockWindow (the palette panel) and
    typeWindow (the Active box) each with a 2px RED border (original/stage.c:273-279:
    XCreateSimpleWindow(..., EDITOR_TOOL_WIDTH, PLAY_HEIGHT, 2, red, black) and the same
    for typeWindow). The modern port draws swatches but no panel border. Draw a 2px red
    rectangle border around SDL2RGN_EDITOR (the palette panel region, src/sdl2_regions.c)
    AND around SDL2RGN_EDITOR_TYPE (the Active box, {545,650,120,35}). Use the region
    coords (sdl2_region_get) so it matches exactly. Red, 2px, matching the original's
    border width and color.

    This is render-only, editor-only. Do NOT touch input, dialogue, HUD content, the
    palette layout/hit-test (done), or gameplay rendering. Write-set: src/game_render.c only.
