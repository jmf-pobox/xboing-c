      prose: |
        Replaced the per-seed wait-out-the-BONUS_SEED-interval loop (up to
        THROTTLE_BONUS_SEED*2=4000 throttle_tick calls per seed) with a direct
        seam: ctx->next_bonus_frame = current_frame + 1 forces try_spawn_bonus's
        `frame >= ctx->next_bonus_frame` gate (src/game_rules.c:101,109) true on
        the very next tick, so each seed now costs exactly 1 throttle_tick. The
        roll itself (find_random_empty_cell + rand()%27) still executes for real
        off the seeded rand() stream -- this is a genuine per-seed roll, not a
        stubbed one. Search still runs seeds 1..500 with early exit on the first
        dynamite roll (found at seed=10 in one diagnostic run); worst case is now
        bounded at 500 ticks total instead of ~2,000,000.

        Timing: the repo's committed test happened to find its match at a low
        seed, so wall-clock before/after look similar (~0.2s) in the common case
        -- the fix's real payoff is eliminating the worst case (Copilot's
        2.7-3.2s concern), which I confirmed structurally by forcing the loop to
        run all 500 seeds with no early exit: timing stayed at 0.23-0.61s either
        way, proving the cost is now seed-count bound (<=500 ticks) rather than
        tick-count bound (<=2,000,000 ticks).

        RED re-confirmed: restoring the bomb@50 play in src/game_rules.c's
