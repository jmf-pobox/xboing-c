context: |
    Produce the implementation blueprint for full editor (SDL2ST_EDIT) parity,
    from the verified audit docs/audits/2026-07-11-editor-parity.md (committed
    b8392a0; jdc-verified, all 9 blocker citations exact). Read that audit first —
    it is the authoritative gap list (9 blockers, 6 majors, 4 minors) with an
    11-step dependency-ordered build plan. This design turns that into a concrete
    HOW, grouped into implementable stages that will become separate implement/
    test missions on this branch (feat/editor-window-width). No code changes here.

    Key facts from the audit + jdc verification:
    - Save-path data corruption is the priority: editor_cb_save_level hardcodes
      fprintf(fp,"120\n") (only 6/80 levels are actually 120; corrupts 92.5% on
      re-save). level_system_get_time_bonus exists (include/level_system.h:127) —
      blocker 6 is INDEPENDENT of dialogue wiring and can be the first fix.
    - block_type_to_char (game_callbacks.c:919-976) drops counter_slide; the
      RANDOM_BLK flag (block_system.h:297-298) is never round-tripped;
      editor_cb_query_cell zeroes counter_slide.
    - editor_cb_yes_no / editor_cb_input_dialogue are stubs. The HARD design
      problem: these callbacks are SYNCHRONOUS (return a value immediately) but a
      faithful modal dialogue is ASYNCHRONOUS (dialogue_system + SDL2ST_DIALOGUE
      push/resume). The blueprint MUST resolve this control-flow mismatch — how
      Save/Load/Set-Time/Set-Name/Clear/Quit-confirm drive a real modal and resume
      the editor action on the result. dialogue_system.c already exists and is used
      for SDL2ST_DIALOGUE elsewhere; ADR-057 already flagged SDL2RGN_DIALOGUE's
      hardcoded 575-wide centering needs re-centering against the 695 editor canvas.
    - Render clusters (sjl's domain at impl time): two-column palette matching
      original/editor.c:329-369 (renders all 30 entries, not 20), Active: indicator
      at the defined-but-unused SDL2RGN_EDITOR_TYPE, rework/remove the invented
      highlight, HUD in editor mode (add SDL2ST_EDIT to the gate at
      game_render.c:1228-1230), gate paddle/ball behind EDITOR_STATE_TEST, red grid
      lines (xboing-c40), editor background choice (minor 1 — verify item).
