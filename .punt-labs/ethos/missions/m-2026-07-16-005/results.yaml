      prose: |
        Added sdl2_audio_wait_all(ctx, max_ms) to include/sdl2_audio.h and
        src/sdl2_audio.c: polls Mix_Playing(-1) in 10ms increments, returns
        early once nothing is playing, bails out after max_ms regardless.
        Guarded by ctx->audio_opened (matches the guard used at
        sdl2_audio.c:366 in destroy). No-op on ctx == NULL.

        Wired into src/game_modes.c mode_dialogue_exit's confirmed-quit
        branch only: after sdl2_audio_play_at_percent(ctx->audio,
        "game_over", 100), call sdl2_audio_wait_all(ctx->audio, 1500)
        before the SDL_QUIT event is pushed. game_over.wav is ~1205ms;
        1500ms cap leaves headroom without risking a perceptibly long hang
        if Mix_Playing never clears.

        Did NOT touch sdl2_audio_destroy — the drain is confined to the
        quit-confirmation path so normal teardown (including every test
        that creates/destroys an audio context) is unaffected. Confirmed
        no test exercises quit_pending's confirmed branch (grep found zero
        matches in tests/), so the ctest suite's timing is unaffected by
        the new blocking call; total suite time (37s debug, 43s asan) is
        consistent with pre-existing runtimes for this suite (test_keybindings
        alone routinely takes 6-7s).

        Expected UX: pressing q then confirming quit with y now holds the
        window open for up to ~1.2s (until game_over.wav finishes) before
        the window closes, versus the prior near-instant close that cut the
        sting off after 1-2 frames. Maintainer should live-verify audibility
        with sound on — this fix guarantees the mixer isn't torn down before
        playback completes, but only a real listen confirms the sample is
        audible end-to-end.
