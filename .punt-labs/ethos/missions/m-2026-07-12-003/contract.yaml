context: |
    Editor parity STAGE 2 of 12 (design docs/specs/2026-07-11-editor-parity.md
    §2.3/§2.4, stage list §5.2; committed ffa9e56). Fixes two save-path data-loss
    bugs together (they share one read path):
    (a) Counter-block hit-count is saved as 0: block_type_to_char
        (src/game_callbacks.c:919-976) takes only block_type and returns '0' for
        COUNTER_BLK, dropping the slide. Original format encodes '0'-'5' per slide
        (original/file.c:418-440). COUNTER_BLK is in most of the 80 levels.
    (b) RANDOM_BLK cells save as their resolved color, not '?': editor_cb_query_cell
        (src/game_callbacks.c:875-884) hardcodes counter_slide=0 and never checks the
        random flag; the save loop reads block_system_get_type directly. The original
        writes '?' by checking blockP->random at save time (original/file.c:562-609) —
        this design REPLICATES that (not a deviation, per jck's round-1 design ruling).
    Mechanism (design §2.3): block_system_get_render_info (include/block_system.h:367-369)
    already fills a block_system_render_info_t carrying BOTH counter_slide (:96) and
    random (:98) in one call — no new accessor needed.
    - editor_cb_query_cell: read via get_render_info; set
      cell->block_type = info.random ? RANDOM_BLK : info.block_type;
      cell->counter_slide = info.counter_slide (stop hardcoding 0). This also fixes
      counter-slide loss across all board transforms (they read through query_cell).
    - block_type_to_char: take a counter_slide arg; for COUNTER_BLK return
      '0' + clamp(counter_slide, 0, 5).
    - editor_cb_save_level save loop (src/game_callbacks.c:992-1001): extract a static
      resolve_save_char(ctx,row,col) that calls get_render_info once and applies the
      same random substitution + passes counter_slide to block_type_to_char.
    - src/editor_system.c normalize_random_blocks (94-111): update the doc comment to
      say it stays a no-op under read-time normalization (NO logic change).
    Confirm block_type_to_char has no caller other than the save loop before changing
    its signature. Do NOT touch the render-side RANDOM_BLK composite (that is stage 8),
    the dialogue mechanism, or any other stage.
