context: |
    RELEASE BUG (ships in 1.0.6, all Apple Silicon Homebrew installs broken): the game cannot find its installed levels/sounds on a fresh host. paths.c resolves assets via env override -> XDG_DATA_DIRS -> XDG_DATA_HOME -> CWD "./levels". The install goes to ${CMAKE_INSTALL_DATADIR}/xboing/levels (CMakeLists:74-80), i.e. the prefix's share dir (/opt/homebrew/Cellar/xboing/<ver>/share on Apple Silicon). But /opt/homebrew/share is NOT in the default XDG_DATA_DIRS (/usr/local/share:/usr/share), and nothing bakes the actual install path into the binary. So `xboing -setup` shows "Levels dir = levels" (relative), and running from $HOME finds no levels -> level01 unloadable. It only "worked" for us because we ran from the repo (CWD ./levels) or had an XDG_DATA_HOME editor-save of level01. Fix: bake the install datadir at build time and add it to the resolution chain.
