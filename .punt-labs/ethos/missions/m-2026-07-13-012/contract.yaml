context: |-
    RELEASE-BLOCKER shipping in 1.0.4/1.0.5/1.0.6: fresh Apple Silicon Homebrew
    installs (prefix /opt/homebrew) launch, play sound, but load no level —
    "Warning: could not find level file: level01.data" (game_init.c:715).

    Bundled levels install to ${CMAKE_INSTALL_DATADIR}/xboing/levels =
    /opt/homebrew/share/xboing/levels (CMakeLists.txt:74-80). But paths.c
    resolve_asset() and resolve_readable_dir() walk env-override -> XDG_DATA_DIRS
    -> XDG_DATA_HOME -> cwd and never consult the compiled install prefix.
    /opt/homebrew/share is in NO XDG_DATA_DIRS entry (macOS leaves it unset;
    Homebrew doesn't add it). Images/fonts/sounds survive only because
    game_init.c:379/398/417 bolt on a XBOING_INSTALLED_*_DIR compile-time
    fallback at their call sites; levels route solely through paths.c which
    lacks it. XBOING_INSTALLED_LEVELS_DIR is defined (xboing_paths.h:38) but
    referenced NOWHERE. Compounding it, the `paths` static lib (CMakeLists.txt
    :594) is compiled WITHOUT XBOING_DATA_DIR, so even reading the macro today
    yields the header default /usr/share/xboing — hence BOTH the -D and the
    resolver tiers are required.

    Design chosen over the report's raw-macro sketch: thread the prefix through a
    new injectable paths_config_t.install_data_dir field (populated once from
    XBOING_DATA_DIR in the init functions) so the resolvers stay config-pure and
    the new tier is unit-testable via paths_init_explicit + direct field override.
    Bead xboing-52j. A sibling `test` mission (gjm) adds the regression test to
    tests/test_paths.c — do not touch tests here.
