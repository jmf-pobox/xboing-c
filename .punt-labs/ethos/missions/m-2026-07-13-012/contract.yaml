success_criteria:
    - 'CMakeLists.txt: add XBOING_DATA_DIR="${CMAKE_INSTALL_FULL_DATADIR}/xboing" to the `paths` static-library target''s target_compile_definitions (line 594, currently only ${XBOING_SECURE_ENV_DEFS}). This is the SAME value already on the xboing executable target (line 632). Without it, paths.c sees the xboing_paths.h header default /usr/share/xboing and the compiled-prefix tier resolves to the wrong place on Homebrew.'
    - 'include/paths.h: add `char install_data_dir[PATHS_MAX_PATH];` to paths_config_t (after xboing_score_file). Document it as the compiled install prefix base (XBOING_DATA_DIR), i.e. "<prefix>/share/xboing", treated read-only after init like the other fields.'
    - 'src/paths.c: `#include "xboing_paths.h"` (project header block). In BOTH paths_init and paths_init_explicit, populate cfg->install_data_dir via safe_copy from XBOING_DATA_DIR (compile-time constant; identical in both). Do NOT add a parameter to paths_init_explicit — keep its signature so no caller changes. memset in paths_init_explicit already zeroes the field before the copy.'
    - 'src/paths.c resolve_asset: insert a new tier AFTER step 3 (XDG_DATA_HOME) and BEFORE step 4 (cwd fallback), guarded by cfg->install_data_dir[0] != 0: build_path(buf, bufsize, cfg->install_data_dir, subdir, filename, NULL); on PATHS_TRUNCATED return it; if file_exists(buf) return PATHS_OK. This fixes the actual level-load bug (paths_level_file -> resolve_asset).'
    - 'src/paths.c resolve_readable_dir: insert the same tier BETWEEN the paths_install_data_dir (XDG) lookup and the cwd default, guarded by cfg->install_data_dir[0] != 0: build cfg->install_data_dir/subdir into a local probe buffer, opendir() existence check (mirror paths_install_data_dir style); on success safe_copy into buf and return PATHS_OK/PATHS_TRUNCATED. Keep paths_install_data_dir itself unchanged (its documented contract is "search $XDG_DATA_DIRS" only).'
    - 'Precedence preserved exactly: XBOING_LEVELS_DIR/XBOING_SOUND_DIR override (tier 1) > XDG_DATA_DIRS (tier 2, Linux /usr/share, Intel /usr/local) > XDG_DATA_HOME editor edits (tier 3) > NEW compiled install prefix (tier 4) > cwd dev fallback (tier 5). A user''s edited ~/.local/share level still shadows the shipped copy; a source/dev build (install prefix /usr/local/share not present on disk) still falls through to ./levels.'
    - 'include/paths.h + include/xboing_paths.h doc: update the levels/sounds-dir resolution-order comments (paths.h ~110-142) and the xboing_paths.h header comment (~1-26) to list the compiled install prefix as an explicit read tier in the correct position, replacing text that documents the buggy order as if intentional.'
    - 'cmake --preset debug && cmake --build build --target xboing paths: zero warnings under -Werror -Wconversion -Wshadow. ctest --test-dir build stays green (existing test_paths cases unaffected — dev build''s /usr/local/share /xboing/levels does not exist, so behavior is identical to before for them). Only the four write_set files change.'
