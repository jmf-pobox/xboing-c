success_criteria:
    - Add regression cases to tests/test_block_system.c pinning the ROAMER/DROP movement restored in mission m-2026-07-15-003 (block_system_update_movement). Read the file first for its existing block_system fixtures + the new function's signature/params (block_system_update_movement(ctx, frame, balls, nballs) — the ball-pos array type is block_system_ball_pos_t). Seed rand deterministically (srand fixed) so timers are reproducible.
    - 'ROAMER moves to a free adjacent cell: place a single ROAMER_BLK on an otherwise-clear grid (or with a known free neighbor), pass no balls, drive block_system_update_movement over enough frames for the move timer to fire, and assert the roamer''s occupied cell CHANGED to an adjacent cell (and the old cell cleared). Before the fix nothing moved — assert the new cell is a 4-neighbor of the start.'
    - 'BOXED-IN roamer waits: place a ROAMER surrounded on all 4 sides by occupied cells (or against the grid edge + bottom-2-row guard), drive many frames, assert it NEVER changes cell (stays put — the check_adjacent gate holds).'
    - 'DROP descends: place a DROP_BLK with a free cell below, drive frames past its drop timer, assert it moved to (row+1, same col) and the old cell cleared. A DROP with the cell below occupied (or within the bottom-2-row guard) stays.'
    - 'Adjacency constraints: assert a roamer/drop will NOT move into (a) an occupied cell, (b) out of bounds, (c) the bottom two rows ((r+1) >= MAX_ROW-2), or (d) a cell currently holding a ball (pass a ball position that maps to the target cell and assert no move). Cover the ball case explicitly — it''s the trickiest.'
    - 'Move FREQUENCY (the round-2 fix): drive a lone roamer with free space for a long run and assert it moves repeatedly (multiple relocations), i.e. every move-timer firing attempts a move — no silent no-op from any eye value. (A regression that reintroduced 0/4=no-move would show ~stuck-1-in-5 behavior; a run long enough makes a stalled roamer detectable.)'
    - Register new test functions in the existing test_block_system runner array (no tests/CMakeLists.txt change — not in write_set; test_block_system is registered). ctest --test-dir build -R test_block_system green under debug AND asan. No timing/wall-clock assertions; deterministic seed; asan-clean; tear down fixtures. The movement cases must FAIL if block_system_update_ movement were reverted to a no-op (reason about it).
