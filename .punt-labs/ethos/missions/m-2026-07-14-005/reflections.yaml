      signals:
        - 'FINDING 1 (ROAMER_BLK/DROP_BLK never move) — CONFIRMED, definitively. Read original/blocks.c:1364-1474 directly: ROAMER_BLK re-rolls its eye-tell frame via nextFrame==frame branch (rand()%ROAM_EYES_DELAY+50) and relocates via AddNewBlock/ClearBlock on the lastFrame==frame branch (rand()%ROAM_DELAY+300, or +DROP_DELAY re-arm if blocked); DROP_BLK does the identical AddNewBlock/ClearBlock pattern gated by rand()%DROP_DELAY+200. Constants verified identical in both trees (original/include/blocks.h:79,81,82 vs include/block_system.h:63,65,66 — DROP_DELAY=1000, ROAM_EYES_DELAY=300, ROAM_DELAY=1000, exact match). In src/, block_system_advance_animations (src/block_system.c:604-646) only computes a deterministic bp->bonus_slide = (frame/BLOCK_ROAM_EYES_DELAY)%5 for ROAMER_BLK and has no DROP_BLK case at all. Grepped all block_system_add( call sites (src/block_system.c:426, game_callbacks.c:862, game_rules.c:91-143, game_init.c:1213, savegame_system.c:392) — every one is level-load/savegame-restore/special-spawn, none relocates an existing block. bp->next_frame/last_frame/drop fields ARE initialized on ROAMER_BLK/DROP_BLK creation (block_system.c:461-469, mirroring the original''s scheduling fields) but are never read back anywhere in src/ for movement — dead/vestigial state. Verified no ADR in docs/DESIGN.md mentions ROAMER or DROP_BLK; ADR-016 is scoped to collision geometry only, exactly as the report states. This is a real missing gameplay mechanic (grid relocation), correctly scored HIGH, arguably underscored since it affects collision/difficulty, not just cosmetics.'
        - 'FINDING 2 (BorderGlow during live gameplay) — CONFIRMED. Grepped original/*.c for BorderGlow: exactly 7 call sites (demo.c:291, highscore.c:530, keysedit.c:286, inst.c:239, keys.c:329, intro.c:406, preview.c:201), all attract/menu screens — matches report''s list exactly. original/main.c:544 calls the DIFFERENT function ResetBorderGlow (not BorderGlow) when leaving attract for MODE_GAME — a one-shot reset, not the animation. handleGameStates (main.c:1341-1478) has zero BorderGlow calls, confirmed by direct read. Modern: src/game_modes.c:315 calls sfx_system_update_glow() unconditionally inside mode_game_update (the MODE_GAME-equivalent handler, called every tick), and src/game_render.c:1390 and :1433 call game_render_border_glow() in both the SDL2ST_GAME render branch and the SDL2ST_DIALOGUE-over-SDL2ST_GAME branch. ADR-023 (docs/DESIGN.md:1386-1445) documents BorderGlow''s constants and calls it ''an independent animation'' but never states or approves it running during MODE_GAME — confirmed undocumented scope expansion, correctly HIGH (always-visible, every gameplay tick).'
        - 'FINDING 3 (bonus screen ~20-30x too slow) — deduction is SOUND, premise verified true by direct code read, correctly hedged. Confirmed original/main.c:1746-1749 and :1876-1879 branch on `if (mode == MODE_GAME || mode == MODE_BALL_WAIT) sleepSync(display, speed); else sleepSync(display, 3);` — exact match to citation. Confirmed MODE_BONUS is set at original/level.c:416 and MODE_BONUS(7) != MODE_GAME(3) != MODE_BALL_WAIT(5) (original/include/main.h). Grepped the entire original/ tree for reads of the global `speed`: only main.c:1747 and :1877, both inside the MODE_GAME/MODE_BALL_WAIT branch — no other .c file reads it (other ''speed'' matches in ball.c/blocks.c/editor.c/gun.c/init.c/keys.c are comments or the unrelated -speed CLI flag, verified by direct read, not the global). This proves SetGameSpeed(SLOW_SPEED) calls in bonus.c (and identically in presents.c/highscore.c/editor.c/preview.c) are inert while MODE_BONUS is active — a codebase-wide dead-write pattern, exactly as claimed. Independently confirmed include/bonus_system.h:30-65 bakes in the false premise verbatim (''original uses LINE_DELAY=100 game ticks at SLOW_SPEED=30ms'' — this claim is contradicted by the mode-dispatch code). The report is careful to label the exact 90-120ms figure as an estimate pending runtime capture while treating the direction/order-of-magnitude as high confidence from the code alone — that calibration is honest and correct. Safe to act on the qualitative conclusion (current constants derived from a false premise, likely order-of-magnitude too slow) without further runtime measurement; NOT safe to hardcode the specific 90-120ms replacement value without the recommended capture.'
        - 'FINDING 4 (DEATH_BLK wink rhythm) — CONFIRMED via tick-by-tick trace of original/blocks.c:1313-1334. Constants match (DEATH_DELAY1=100, DEATH_DELAY2=700, both trees, original/include/blocks.h:75-76 vs include/block_system.h:59-60). Traced the original state machine by hand: bonusSlide holds at 0 for 700 ticks, then increments through 1,2,3 at 100-tick steps; when it would become 4 the very next iteration''s reset-to-0 branch (bonusSlide>4 check after increment to 5) draws slide 0 in the SAME tick that slide 4 was drawn, so slide 4 is never visible on screen — verified this double-draw-same-tick behavior directly in blocks.c:1320-1330. Total original period = 1000 ticks with a long idle hold. Modern src/block_system.c:626-629 computes bp->bonus_slide=(frame/BLOCK_DEATH_DELAY1)%5 — uniform 100-tick-per-step, 500-tick period, no idle hold, and slide 4 IS visible for 100 ticks every cycle. Report''s table and conclusion are numerically correct. MEDIUM severity is reasonable (visible but non-gameplay-affecting).'
        - 'FINDING 5 (BONUS_BLK spin reversed) — CONFIRMED. original/blocks.c:1188-1207: bonusSlide-- every BONUS_DELAY=150 ticks, wraps to 3 when <0 (i.e. counts down: 0,3,2,1,repeat). Modern src/block_system.c:619-624: (frame/BLOCK_BONUS_DELAY)%4 counts up: 0,1,2,3,repeat. BONUS_DELAY=150 matches in both trees (original/include/blocks.h:72 vs include/block_system.h:57). Same period (600 ticks), exact mirror-image sequence — correctly scored LOW (cosmetic only).'
        - 'MATCHES SPOT-CHECKED AND CONFIRMED: EXTRABALL_BLK (EXTRABALL_DELAY=300 both trees, 2-state flip, no direction to reverse); EXPLODE_DELAY=10 both trees; ball animation constants BALL_FRAME_RATE=5, BALL_ANIM_RATE=15, BIRTH_FRAME_RATE=5, BALL_AUTO_ACTIVE_DELAY=3000 all identical in original/ball.c call sites vs include/ball_types.h; EyeDude EYEDUDE_FRAME_RATE=30 identical in original/eyedude.c:308/include/eyedude.h:64 vs src/eyedude_system.c:193/include/eyedude_system.h:27, both called once per gameplay tick. Paddle size-change: confirmed no transition animation in original/paddle.c ChangePaddleSize — correctly N/A in both. The cross-referenced paddle-velocity 2x finding is genuinely already logged in docs/audits/2026-07-13-gameplay-logic-parity.md section 9 (verified) and is not double-counted here — correct discipline. Also independently noticed include/paddle_system.h:49 comment already self-documents the 2x deviation in code, consistent with the prior audit.'
        - 'ADR cross-check: confirmed accurate. ADR-016 (docs/DESIGN.md:956) is scoped to collision-geometry math only, no movement/animation content — the ''undocumented gap'' framing for finding 1 is correct. ADR-023 (docs/DESIGN.md:1386) documents BorderGlow''s constants/existence but not its MODE_GAME scope — ''undocumented scope expansion'' framing for finding 2 is correct. Severities (2xHIGH structural, 1xHIGH-needs-runtime, 1xMEDIUM, 2xLOW) are proportionate to player-visible impact and correctly ranked. Tangential note: ADR-069 is cited by both this report and the prior gameplay audit but does not yet exist as an actual entry in docs/DESIGN.md (only ADR-068 is the highest number present) — this is a pre-existing gap from the prior mission/PR#184, not a defect introduced by this report, and out of this report''s write_set to fix.'
        - 'COMPLETENESS GAP (minor): the mission''s success criteria explicitly names ''counter-block slide'' as a cadence item to cover, and the report never mentions COUNTER_BLK anywhere. Verified independently: COUNTER_BLK''s counterSlide is decremented purely on-hit (original/gun.c:328-362, src/block_system.c:1079-1106 block_system_decrement_gun_hit/block_system_ball_hit_counter) with NO nextFrame/timer gating in either tree — it is event-driven, not time-based, so there is likely no cadence bug possible by construction. The report''s silent omission is very likely benign in substance (would resolve to ''N/A, event-driven in both, no timing constant to compare'' — the same treatment given to paddle size-change) but leaves one explicitly-named contract item completely unaddressed rather than explicitly closed out. This is a one-paragraph fix, not a rework.'
      recommendation: continue
      reason: 'All 6 ranked findings and every cited constant/line number were independently re-derived from the actual source (not trusted from the report) and check out numerically and logically correct, including the two highest-stakes claims (roamer/drop movement genuinely absent from src/; BorderGlow genuinely gameplay-scoped in modern but never in original) and the well-hedged deductive bonus-screen finding. ADR cross-checks are accurate. The only defect found is a narrow completeness gap: ''counter-block slide'' is explicitly named in the mission''s success criteria and is never mentioned in the report, even though independent verification suggests it is a non-issue (event-driven counter in both trees, no per-tick timing to compare). Recommend one bounded addition — a short paragraph (or a one-line note in an existing section) stating COUNTER_BLK''s slide is hit-driven, not time-based, in both original/gun.c and src/block_system.c, and is therefore N/A for a cadence audit — to fully discharge the named success criterion before closing. This is the only blocking gap; no other correction is needed.'
